# ============================================================
# Configuration Mask R-CNN - Fine-tuning Fissures (Detectron2)
# ============================================================

# --- Modèle ---
MODEL:
  META_ARCHITECTURE: "GeneralizedRCNN"
  BACKBONE:
    NAME: "build_resnet_fpn_backbone"
    FREEZE_AT: 2                      # Geler les 2 premières couches (fine-tuning)
  RESNETS:
    OUT_FEATURES: ["res2", "res3", "res4", "res5"]
    DEPTH: 101                        # ResNet-101 pour meilleures performances
    STRIDE_IN_1X1: true
  FPN:
    IN_FEATURES: ["res2", "res3", "res4", "res5"]
  ANCHOR_GENERATOR:
    SIZES: [[4], [8], [16], [32], [64]]
    ASPECT_RATIOS: [[0.25, 0.5, 1.0, 2.0, 4.0]]  # Ratios adaptés aux fissures longues
  RPN:
    IN_FEATURES: ["p2", "p3", "p4", "p5", "p6"]
    PRE_NMS_TOPK_TRAIN: 2000
    PRE_NMS_TOPK_TEST: 1000
    POST_NMS_TOPK_TRAIN: 1000
    POST_NMS_TOPK_TEST: 500
    NMS_THRESH: 0.7
    BATCH_SIZE_PER_IMAGE: 256
    POSITIVE_FRACTION: 0.5
    LOSS_WEIGHT: 1.0
  ROI_HEADS:
    NAME: "StandardROIHeads"
    IN_FEATURES: ["p2", "p3", "p4", "p5"]
    NUM_CLASSES: 1                    # Ignoré par train_maskrcnn.py/evaluate.py : le nombre
                                       # réel de classes est détecté automatiquement depuis
                                       # le JSON COCO (_annotations.coco.json) au lancement
    BATCH_SIZE_PER_IMAGE: 512
    POSITIVE_FRACTION: 0.25
    SCORE_THRESH_TEST: 0.05
    NMS_THRESH_TEST: 0.4
    IOU_THRESHOLDS: [0.5, 0.75]
    IOU_LABELS: [0, -1, 1]
  ROI_BOX_HEAD:
    NAME: "FastRCNNConvFCHead"
    NUM_FC: 2
    FC_DIM: 1024
    NUM_CONV: 4
    CONV_DIM: 256
    NORM: "GN"
    POOLER_RESOLUTION: 7
    POOLER_SAMPLING_RATIO: 2
    POOLER_TYPE: "ROIAlignV2"
  ROI_MASK_HEAD:
    NAME: "MaskRCNNConvUpsampleHead"
    NUM_CONV: 4
    CONV_DIM: 256
    NORM: "GN"
    POOLER_RESOLUTION: 14
    POOLER_SAMPLING_RATIO: 2
    POOLER_TYPE: "ROIAlignV2"
  WEIGHTS: "detectron2://ImageNetPretrained/MSRA/R-101.pkl"  # Poids pré-entraînés

# --- Dataset ---
# Noms des splits enregistrés dans le DatasetCatalog (voir train_maskrcnn.py)
DATASETS:
  TRAIN: ["fissures_train"]
  TEST: ["fissures_val"]

# --- DataLoader ---
DATALOADER:
  NUM_WORKERS: 4
  FILTER_EMPTY_ANNOTATIONS: true
  REPEAT_THRESHOLD: 0.0

# --- Solver (optimiseur) ---
SOLVER:
  BASE_LR: 0.00005                  # LR légèrement plus conservateur pour éviter le sur-apprentissage
  BIAS_LR_FACTOR: 2.0
  WEIGHT_DECAY: 0.0001
  WEIGHT_DECAY_NORM: 0.0
  MOMENTUM: 0.9
  MAX_ITER: 12000                   # Iterations totales
  STEPS: [7000, 9000]              # Paliers de réduction LR (facteur 10)
  GAMMA: 0.1
  WARMUP_FACTOR: 0.001
  WARMUP_ITERS: 800                 # Warmup un peu plus long car LR de base plus élevé
  WARMUP_METHOD: "linear"
  CHECKPOINT_PERIOD: 500           # Sauvegarder toutes les N itérations
  IMS_PER_BATCH: 4                 # Images par batch (ajuster selon VRAM)
  CLIP_GRADIENTS:
    ENABLED: true
    CLIP_TYPE: "full_model"
    CLIP_VALUE: 1.0
    NORM_TYPE: 2.0
  AMP:
    ENABLED: true                  # Mixed precision

# --- Augmentation (input) ---
# Le flip horizontal seul ne suffit pas pour un petit dataset (697 images) :
# train_maskrcnn.py ajoute aussi flip vertical + rotation + luminosité/contraste
# via un DatasetMapper personnalisé (voir FissureTrainer.build_train_loader).
INPUT:
  MIN_SIZE_TRAIN: [480, 512, 544, 576, 608, 640, 672, 704, 736, 768, 800]
  MAX_SIZE_TRAIN: 1333
  MIN_SIZE_TEST: 800
  MAX_SIZE_TEST: 1333
  FORMAT: "BGR"
  MASK_FORMAT: "polygon"
  RANDOM_FLIP: "horizontal"

# --- Test ---
TEST:
  EVAL_PERIOD: 500                 # Évaluer toutes les N itérations
  DETECTIONS_PER_IMAGE: 200
  AUG:
    ENABLED: false

# --- Sortie ---
OUTPUT_DIR: "outputs/maskrcnn/run"

# --- Divers ---
SEED: 42
VERSION: 2
