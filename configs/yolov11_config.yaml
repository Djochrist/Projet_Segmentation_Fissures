# ============================================================
# Configuration YOLOv11 Segmentation - Fine-tuning Fissures
# ============================================================

# --- Modèle ---
model: yolo11x-seg.pt          # Checkpoint pré-entraîné (poids ImageNet/COCO)
task: segment

# --- Dataset ---
# Chemins relatifs à data_root (défini dans le script d'entraînement)
# Structure attendue : segmentation_fissures.v6i.yolov11/
#   ├── train/images/  train/labels/
#   ├── valid/images/  valid/labels/
#   └── test/images/   test/labels/
data: configs/dataset_yolo.yaml   # généré automatiquement par train_yolov11.py

# --- Hyperparamètres d'entraînement ---
epochs: 100
patience: 20                  # Early stopping : arrêt si pas d'amélioration pendant N époques
batch: 8                      # Ajuster selon la VRAM disponible (16 si A100)
imgsz: 640
optimizer: AdamW
lr0: 0.0005                   # Learning rate initial (réduit pour fine-tuning)
lrf: 0.01                     # Learning rate final = lr0 * lrf
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3
warmup_momentum: 0.8
warmup_bias_lr: 0.1
box: 7.5                      # Poids perte box
cls: 0.5                      # Poids perte classification
dfl: 1.5                      # Poids distribution focal loss
pose: 12.0
kobj: 1.0
label_smoothing: 0.0
nbs: 64                       # Nominal batch size pour auto-scaling LR
overlap_mask: true
mask_ratio: 1                      # Masques pleine résolution — critique pour fissures de 1-3 px
dropout: 0.1                  # Régularisation dropout
amp: true                     # Mixed precision (FP16)

# --- Augmentation ---
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 10.0                 # Rotation (fissures apparaissent à toutes orientations)
translate: 0.1
scale: 0.5
shear: 2.0
perspective: 0.0001
flipud: 0.3                   # Flip vertical (murs peuvent être analysés de différentes orientations)
fliplr: 0.5
mosaic: 1.0                   # Mosaic augmentation
mixup: 0.1
copy_paste: 0.1               # Utile pour la segmentation d'instances
auto_augment: randaugment
erasing: 0.4
crop_fraction: 1.0

# --- Validation ---
val: true
save_period: 10               # Sauvegarder un checkpoint toutes les N époques
save: true
save_json: true               # Sauvegarder les prédictions JSON (COCO format)
plots: true                   # Générer les courbes de métriques

# --- Inférence ---
conf: 0.25
iou: 0.45
max_det: 300
retina_masks: true            # Masques haute résolution
half: false                   # Utiliser FP32 pour l'inférence (plus stable)

# --- Système ---
device: 0                     # GPU 0 (ou 'cpu')
workers: 4
project: outputs/yolov11
name: run
exist_ok: false
verbose: true
seed: 42
deterministic: true
single_cls: true              # Une seule classe : fissure
